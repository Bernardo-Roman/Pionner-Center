<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo circular naranja con borde sutil -->
  <circle cx="16" cy="16" r="15" fill="#FF8C00"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="#E67E00" stroke-width="1"/>
  
  <!-- Celular con bordes redondeados -->
  <rect x="9" y="5" width="14" height="22" rx="3" fill="#FFFFFF"/>
  
  <!-- Pantalla negra con notch superior -->
  <rect x="11" y="8" width="10" height="16" rx="2" fill="#000000"/>
  
  <!-- Notch/cámara superior -->
  <rect x="14" y="6" width="4" height="2" rx="1" fill="#333"/>
  
  <!-- Letras PC en naranja sobre la pantalla -->
  <text x="16" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#FF8C00">PC</text>
  
  <!-- Botón home circular -->
  <circle cx="16" cy="25" r="2" fill="#333"/>
</svg>
